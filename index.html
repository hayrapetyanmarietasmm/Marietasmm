<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<title>WonderKid Գրանցում</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffe0f0, #d0f4ff);
  margin: 0;
  text-align: center;
}

.container {
  margin-top: 40px;
}

form {
  background: #fff;
  width: 340px;
  margin: auto;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1 {
  color: #ff5c8a;
  margin-bottom: 5px;
}

.address {
  font-size: 14px;
  color: #555;
  margin-bottom: 15px;
}

.section-title {
  text-align: left;
  font-weight: bold;
  margin-top: 10px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  background: #ff5c8a;
  color: #fff;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #ff2f6d;
}

#success {
  display: none;
  color: green;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Բարի գալուստ</h1>
  <h2>WonderKid Kindergarten</h2>
  <div class="address">📍 Չեխով 14/2</div>

  <form id="form">

    <div class="section-title">Երեխայի տվյալներ</div>
    <input type="text" name="child_name" placeholder="Անուն" required>
    <input type="text" name="child_surname" placeholder="Ազգանուն" required>
    <input type="date" name="birth_date" required>

    <div class="section-title">Ծնողի տվյալներ</div>
    <input type="text" name="parent_name" placeholder="Անուն" required>
    <input type="text" name="parent_surname" placeholder="Ազգանուն" required>
    <input type="tel" name="phone" placeholder="Հեռախոսահամար" required>

    <button type="submit">Ուղարկել</button>

    <div id="success">Գրանցումը հաջողությամբ ուղարկվեց ✅</div>
  </form>
</div>

<script>
(function(){
  emailjs.init("YOUR_PUBLIC_KEY");
})();

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
    child_name: this.child_name.value,
    child_surname: this.child_surname.value,
    birth_date: this.birth_date.value,
    parent_name: this.parent_name.value,
    parent_surname: this.parent_surname.value,
    phone: this.phone.value
  })
  .then(() => {
    document.getElementById("success").style.display = "block";
    this.reset();
  })
  .catch(() => {
    alert("Տեղի ունեցավ սխալ։ Խնդրում ենք փորձել կրկին։");
  });
});
</script>

</body>
</html>
